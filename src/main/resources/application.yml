spring:
  application:
    name: ai-support-triage-agent
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.3
      embedding:
        enabled: false # use the local transformers embedding model instead; Groq has no embeddings API
  datasource:
    url: jdbc:h2:mem:triagedb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

triage:
  confidence-threshold: 0.7

logging:
  level:
    com.triage: DEBUG
