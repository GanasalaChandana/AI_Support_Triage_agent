spring:
  application:
    name: ai-support-triage-agent
  ai:
    openai:
      api-key: ${GROQ_API_KEY:}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.3
      embedding:
        enabled: false # Groq has no embeddings API; Cohere is used instead (see cohere.* below)
  datasource:
    url: jdbc:h2:mem:triagedb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true

cohere:
  api-key: ${COHERE_API_KEY:}
  embedding-model: embed-english-v3.0

jira:
  base-url: ${JIRA_BASE_URL:}
  email: ${JIRA_EMAIL:}
  api-token: ${JIRA_API_TOKEN:}
  project-key: ${JIRA_PROJECT_KEY:}

triage:
  confidence-threshold: 0.7

logging:
  level:
    com.triage: DEBUG
